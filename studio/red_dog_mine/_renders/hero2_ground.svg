<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" role="img"
  aria-label="Stored contact water rose about 60 percent from 3.3 billion to 5.3 billion gallons between 2017 and 2021, climbing toward the tailings dam freeboard. The August 2012 storm of 15.2 inches exceeded the dam's design flood. ADEC states there is no reasonably available remedy to the thawing of permafrost.">
  <rect x="0" y="0" width="720" height="330" fill="#ffffff"/>
  <!-- ===== LEFT: the rising water bars vs the freeboard ceiling ===== -->
  <text x="40" y="34" font-family="Inter,Carlito,sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">Stored contact water, climbing toward the dam</text>
  <!-- freeboard ceiling -->
  <line x1="40" y1="62" x2="300" y2="62" stroke="#d33a3a" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="300" y="58" text-anchor="end" font-family="Inter,Carlito,sans-serif" font-size="11" font-weight="600" fill="#d33a3a">dam freeboard / design envelope</text>
  <!-- 2017 bar -->
  <rect x="70" y="170" width="70" height="100" rx="3" fill="#bcd2e0" stroke="#9bb6c7" stroke-width="1"/>
  <text x="105" y="288" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="12" fill="#737373">2017</text>
  <text x="105" y="162" text-anchor="middle" font-family="Inter,Carlito,sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">3.3B gal</text>
  <!-- 2021 bar -->
  <rect x="190" y="90" width="70" height="180" rx="3" fill="#efbf6a" stroke="#efa831" stroke-width="1.5"/>
  <text x="225" y="288" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="12" fill="#737373">2021</text>
  <text x="225" y="82" text-anchor="middle" font-family="Inter,Carlito,sans-serif" font-size="12" font-weight="600" fill="#7a3b00">5.3B gal</text>
  <!-- +60% arrow -->
  <path d="M150 150 C 168 140, 176 128, 182 104" fill="none" stroke="#7a3b00" stroke-width="1.5" marker-end="url(#up)"/>
  <text x="158" y="125" font-family="Inter,Carlito,sans-serif" font-size="13" font-weight="700" fill="#7a3b00">+60%</text>
  <text x="40" y="312" font-family="Inter,Carlito,sans-serif" font-size="11" fill="#737373">a wetter Arctic + permafrost thaw, 2017&#8211;2021</text>
  <!-- divider -->
  <line x1="350" y1="24" x2="350" y2="306" stroke="#e5e5e5" stroke-width="1"/>
  <!-- ===== RIGHT: two fact cards ===== -->
  <!-- card 1: the 2012 storm -->
  <rect x="380" y="40" width="300" height="92" rx="6" fill="#fdebd0" stroke="#efa831"/>
  <text x="398" y="66" font-family="Inter,Carlito,sans-serif" font-size="13" font-weight="700" fill="#7a3b00">Already past the design envelope</text>
  <text x="398" y="89" font-family="Inter,Carlito,sans-serif" font-size="12.5" fill="#5a3000">The Aug-2012 storm dropped 15.2 in of rain,</text>
  <text x="398" y="107" font-family="Inter,Carlito,sans-serif" font-size="12.5" fill="#5a3000">exceeding the tailings dam's design flood.</text>
  <text x="398" y="125" font-family="JetBrains Mono,monospace" font-size="10.5" fill="#9a6a2a">ADEC Statement of Basis, 2026-04-09</text>
  <!-- card 2: the ADEC concession -->
  <rect x="380" y="148" width="300" height="100" rx="6" fill="#f5f5f5" stroke="#d33a3a" stroke-width="0"/>
  <rect x="380" y="148" width="4" height="100" rx="2" fill="#d33a3a"/>
  <text x="398" y="174" font-family="Inter,Carlito,sans-serif" font-size="13" font-weight="700" fill="#0a0a0a">The regulator's concession</text>
  <text x="398" y="197" font-family="Inter,Carlito,sans-serif" font-size="12.5" font-style="italic" fill="#3a3a3a">&#8220;There is no reasonably available</text>
  <text x="398" y="215" font-family="Inter,Carlito,sans-serif" font-size="12.5" font-style="italic" fill="#3a3a3a">remedy to the thawing of permafrost</text>
  <text x="398" y="233" font-family="Inter,Carlito,sans-serif" font-size="12.5" font-style="italic" fill="#3a3a3a">and its impact on the receiving waters.&#8221;</text>
  <text x="398" y="276" font-family="Inter,Carlito,sans-serif" font-size="11.5" fill="#737373">A 10-year compliance runway to ~2036. The water</text>
  <text x="398" y="293" font-family="Inter,Carlito,sans-serif" font-size="11.5" fill="#737373">problem now outlives the ~6 years of ore left.</text>
  <defs>
    <marker id="up" markerWidth="9" markerHeight="9" refX="4.5" refY="2" orient="auto"><path d="M0,9 L4.5,1 L9,9 Z" fill="#7a3b00"/></marker>
  </defs>
</svg>
