identity:
  slug: "ice_storm_transmission"
  title: "Ice Storm Exposure For Transmission, Wind, and Delivery-Dependent Assets"
  version: "0.0.1-draft"
  status: "draft"
  owner: "InfraSure Insights"
  last_reviewed: "2026-06-29"

maturity:
  grounding_maturity: "model-not-wired"  # EXPOSURE (the ice-storm belt geography + transmission-corridor / open-terrain wind
                                          # siting) + the realized EVENT (a named ice storm in hazards news) ground TODAY →
                                          # directional. But per-line/per-plant impact needs an outage record, and the
                                          # $ / ice-load-failure-probability layer is model-gpr — see blocked_claims.
  data_maturity: "M"                      # plant geometry + fuel + owner present and let us place generation in the ice belt;
                                          # BUT the hazard is largely on the WIRES (transmission/distribution), and conductor /
                                          # tower ice-load ratings are NOT in the substrate; monthly CF cannot resolve an outage.

taxonomy:
  domain: hazard                  # folder axis — shares NOAA + hazards-news + footprint machinery with the sibling hazard resources
  family: exposure                # primary family; the resource ALSO serves event_translation (a realized ice storm → asset)
  drivers:
    - ice_storm
    - ice_accretion
    - freezing_rain
    - transmission_loading
    - natcat                       # maps the hazards-news risk_factor R12_NATCAT_FM
  actors:
    - owner_operator
    - investor
    - lender
    - developer

knowledge_ref: "knowledge.md"

peril:
  predictability: "forecastable-1-to-3-days"  # NWS ice-storm warnings + freezing-rain accretion forecasts give 1-3 days of
                                              # lead; the exact accretion thickness + which spans fail is short-fuse
  key_datasets: ["NOAA NWS ice-storm warnings + freezing-rain climatology", "SPIA Ice Accumulation Index / historical ice-storm records", "InfraSure hazards news (subcategory=ice_storm|freezing_rain|winter_storm)"]
  climate_attribution_confidence: "low-to-medium"   # freezing-rain frequency trends are contested; a possible poleward shift
                                                     # of the ice-storm belt is an emerging but weak signal — caps trend claims
  financial_materiality: "high"   # transmission/distribution rebuild after a major ice storm is capital-intensive and the
                                  # outage is widespread + prolonged — TIE-BREAKER, never grounding
  insurance_treatment: "T&D physical-damage + business-interruption; restoration cost can dominate; a healthy generator stranded behind a downed line still loses revenue without a physical-damage claim"

question_grammar:
  allowed_questions:
    - "Which transmission corridors / wind assets / delivery-dependent generators sit in an ice-storm-exposed geography (the ice belt), and how materially?"
    - "Through what mechanism is the asset exposed — ice accretion loading conductors/towers to mechanical failure (transmission); blade icing → wind protective shutdown; distribution-network downing → otherwise-healthy generation stranded behind the break?"
    - "What did a realized ice storm mean for the grid + assets in the affected corridor (a regional event)?"
    - "Who should monitor or harden against the exposure, and why?"
  blocked_questions:
    - "What is the exact $ loss / restoration cost / insurance payout from this ice storm at this asset?"
    - "What is the forward annual probability or return-period of a damaging ice load at this specific span / site?"
    - "What exact plant-level generation loss did the ice storm cause, read from the CF series?"
    - "Which specific transmission spans or towers collapsed (conductor ratings + line geometry not in the substrate)?"
    - "Which accounts should receive outreach before the insight is validated?"

scope:
  entity_types:
    - plant
    - generator
    - company_owner
  fuels_or_technologies:
    - transmission                 # PRIMARY: ice load → conductor / tower mechanical failure → delivery outage (mechanism A)
    - wind                         # blade icing → protective shutdown (mechanism B)
    - solar                        # delivery-dependent — stranded behind a downed line (mechanism C); minor direct icing
    - gas                          # delivery-dependent — a healthy plant cannot export behind a break (mechanism C)
    - battery                      # delivery-dependent (mechanism C)
  regions_or_markets:
    - "one selected region or market per test (test 001 = South-Central ice belt / Oklahoma–Texas–Arkansas)"
  lifecycle_phases:
    - operating
    - queue          # siting + interconnection-corridor ice-load design are in scope (developer actor)
  actors:
    - owner_operator
    - investor
    - lender
    - developer

inputs:
  substrate_inputs:
    - name: "plant_location_and_geometry"
      required: true
      use: "Place the asset / its interconnection in the ice-belt geography (lat/lon, county)"
    - name: "fuel_or_technology"
      required: true
      use: "Determines the mechanism: transmission ice-load (primary), wind blade-icing, or delivery-dependent stranding"
    - name: "capacity_mw"
      required: true
      use: "Materiality; recommended threshold >= 50 MW"
    - name: "generation_monthly_cf"
      required: false
      use: "CONTEXT ONLY — monthly CF cannot isolate an ice-storm outage from the winter seasonal pattern; never the damage proof"
    - name: "owner_company_chain"
      required: false
      use: "Actor relevance + portfolio ice-belt accumulation (incl. transmission ownership)"
    - name: "hazards_news"
      required: false
      use: "Realized event grounding — search_news(category=hazards, query='ice storm'/'freezing rain'); VERIFY each classification"
    - name: "nearby_plants"
      required: false
      use: "Same-corridor fan-out — other assets dependent on the same delivery path"
  external_inputs:
    - name: "NOAA_NWS_ice_storm_records"
      required: true
      freshness: "freezing-rain climatology (stable) + live ice-storm warnings (dated)"
      use: "Establish the ice-belt geography + event window; cite NOAA NWS"
    - name: "SPIA_ice_accumulation_index"
      required: false
      freshness: "historical index + event-driven (dated)"
      use: "Characterize the severity of accretion + expected damage tier for the corridor; cite"
  descriptive_context:
    - name: "plant_or_company_summary"
      required: false
      use: "Frame the entity; never claim grounding alone"
  actor_context:
    - name: "owner_or_lender_context"
      required: false
      use: "Route the insight; T&D / financing relevance where available"

procedure:
  steps:
    - "Establish the ice-belt geography (NOAA NWS freezing-rain climatology + SPIA index) and/or a realized event (hazards news)."
    - "State the mechanism + the THREE claim types: A TRANSMISSION ice-load → conductor/tower mechanical failure → delivery outage (the PRIMARY hazard); B WIND blade icing → protective shutdown; C DELIVERY-DEPENDENT stranding → a healthy plant cannot export behind a downed line. Note this is primarily a WIRES hazard, not a generation-equipment hazard."
    - "Select one region/market (test 001 = South-Central ice belt / OK–TX–AR) and the relevant asset class(es)."
    - "Resolve the fleet / corridor via the MCP (state= proxy; the iso filter is unwired — see data_requirements)."
    - "Place assets + their delivery path in the ice belt (geometry + nearby_plants); VERIFY any hazards-news classification."
    - "Where a realized event exists, use get_plant.generation ONLY as context — and explicitly note monthly CF cannot isolate an ice-storm outage from the winter seasonal pattern."
    - "Retrieve owner/company context for actor relevance and portfolio ice-belt accumulation (including transmission ownership)."
    - "Assemble: condition + scope + mechanism + evidence + confidence + caveat + actor relevance."
    - "Block/downgrade the $ loss / restoration cost, the forward ice-load probability/return-period, the per-span/per-plant attribution, and any single-cause CF attribution. Distinguish physical generation damage from delivery stranding."

allowed_claims:
  - "Directional ice-storm exposure for a scoped transmission, wind, or delivery-dependent asset set / geography"
  - "Mechanism statements by claim type: ice-load → conductor/tower failure (transmission, the primary hazard); blade icing → wind shutdown; distribution downing → delivery-dependent stranding (each cited)"
  - "The framing that this is primarily a DELIVERY-INFRASTRUCTURE hazard — a healthy generator can lose revenue with no physical damage when stranded behind a downed line"
  - "Realized event framing: a named ice storm affected a named corridor / grid near a scoped asset (a regional fact, not a per-span / per-plant damage claim)"
  - "Owner / portfolio ice-belt accumulation (including transmission ownership)"
  - "Mitigation statements (conductor / tower ice-load design upgrades, line de-icing, blade de-icing / heating, vegetation management, redundant delivery paths), cited"
  - "Monitoring / hardening recommendations for owners, lenders, developers"

blocked_claims:
  - "Exact $ damage, restoration cost, EAL, or insurance payout from an ice storm (model-gpr / not on the MCP)"
  - "Forward annual probability or return-period of a damaging ice load at a specific span / site (needs an ice-load model + line ratings)"
  - "Per-plant or per-span generation/delivery loss attributable to an ice storm from the CF series alone"
  - "Single-cause attribution — asserting an observed CF change was caused by an ice storm (the winter seasonal pattern confounds)"
  - "Which specific transmission spans or towers collapsed (conductor ratings + line geometry not in the substrate)"
  - "National conclusions from one regional test"
  - "Outreach copy before the insight is validated"

confidence_rules:
  high: "NOT reachable here on the substrate alone — would need a verified per-line / per-asset outage record (which the substrate does not carry) or a served ice-load model with conductor/tower ratings."
  medium: "Mechanism + ice-belt-geography exposure framing on a clear geography (NOAA freezing-rain climatology or SPIA index + resolved scoped fleet/corridor), with the claim type stated."
  low: "Forward / probabilistic ice-load exposure without an ice-load model; OR any event-context claim leaning on monthly CF."
  blocked: "No verified hazard classification, scope unresolved, or a $ / return-period / per-span-or-plant-attribution / single-cause-CF claim is requested."

caveats:
  required:
    - "The THREE mechanisms are DISTINCT and must not be conflated: A TRANSMISSION ice-load → conductor/tower mechanical failure (the PRIMARY hazard); B WIND blade icing → protective shutdown; C DELIVERY-DEPENDENT stranding → a healthy plant cannot export behind a downed line. State which one applies."
    - "This is primarily a DELIVERY-INFRASTRUCTURE hazard — the loss is often grid-side, not plant-side; a physically undamaged generator can still lose revenue. Distinguish physical generation damage from delivery stranding. (Generation-side freeze mechanisms — gas wellhead/pipeline freeze — live in the extreme_cold_winter_storm resource; cross-reference, do not double-count.)"
    - "Conductor / tower ice-load ratings and line geometry are NOT in the substrate, so per-span failure cannot be claimed — only geographic ice-belt exposure."
    - "Monthly capacity factor CANNOT isolate an ice-storm outage from the normal winter seasonal pattern — a CF dip is consistent with seasonal low output and does NOT prove ice-storm damage."
    - "Freezing-rain frequency trends are contested — cap any trend claim at directional, and treat a poleward ice-belt shift as an emerging, weak signal."
    - "Dollar severity, restoration cost, and insurance outcome are NOT modeled here (directional only) — that layer is model-gpr."

actor_relevance:
  - actor: "owner_operator"
    why: "For transmission owners: conductor/tower ice-load design + line de-icing + vegetation management + restoration spares. For generators: delivery-path redundancy + blade de-icing (wind); stranding-risk awareness behind a single delivery path."
    renderings:
      - platform_card
      - account_note
  - actor: "investor"
    why: "Portfolio ice-belt accumulation (including transmission holdings); delivery-stranding as a recurring revenue risk distinct from physical damage; T&D restoration-cost exposure."
    renderings:
      - platform_card
      - portfolio_note
  - actor: "lender"
    why: "DSCR stress from a delivery-stranding or T&D-damage outage on a financed asset (directional); transmission-owner restoration-cost exposure as a collateral consideration."
    renderings:
      - account_note
  - actor: "developer"
    why: "Interconnection-corridor ice-load design + delivery-path redundancy + blade-heating spec for queue-stage assets in the ice belt."
    renderings:
      - account_note

staleness_signals:
  - "New hazards news for the scoped region/assets (a new ice storm in the corridor)"
  - "Generation substrate refresh (a new month — used only as context here)"
  - "NOAA NWS freezing-rain climatology / SPIA index update; a new winter season"
  - "Plant / transmission geometry / ownership refresh; a conductor-rating or line-geometry field becomes available"
  - "A served ice-load / ice-storm peril model becomes available — upgrades directional → quantitative"
  - "A version change in a shared resources/_* layer this resource was validated against"

prompt_projection:
  include_in_prompt:
    - "question grammar"
    - "scope"
    - "procedure"
    - "allowed claims"
    - "blocked claims"
    - "confidence rules"
    - "output format"
  exclude_from_prompt:
    - "long background prose"
    - "full repo context"
    - "email drafting instructions"
